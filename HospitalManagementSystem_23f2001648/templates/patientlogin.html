<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SwasthBharat  — Book Your Appointment</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
/* ===== LOGIN PAGE ===== */

:root {
  --deep: #0b1a2e;
  --navy: #112240;
  --teal: #0d9488;
  --teal-light: #14b8a6;
  --gold: #f0a500;
  --cream: #faf7f2;
  --white: #ffffff;
  --gray: #8b9ab0;
  --light-bg: #f0f6ff;
 }

 *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

 html { scroll-behavior: smooth; }

 body {
    font-family: 'DM Sans', sans-serif;
    background: var(--deep);
      color: var(--white);
      overflow-x: hidden;
    }

    /* ── NOISE OVERLAY ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

.login-container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.login-card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 40px 30px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  text-align: center;
}

.login-title {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  margin-bottom: 10px;
}

.login-sub {
  color: var(--gray);
  font-size: 14px;
  margin-bottom: 25px;
}

/* FORM */
.form-group {
  text-align: left;
  margin-bottom: 18px;
}

.form-group label {
  font-size: 13px;
  color: var(--gray);
  margin-bottom: 6px;
  display: block;
}

.form-group input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: white;
  font-size: 14px;
  outline: none;
  transition: 0.2s;
}

.form-group input:focus {
  border-color: var(--teal-light);
  background: rgba(255,255,255,0.08);
}

/* BUTTON */
.login-btn {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, var(--teal), var(--teal-light));
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(20,184,166,0.4);
}

/* LINKS */
.login-links {
  margin-top: 18px;
  font-size: 13px;
}

.login-links a {
  color: var(--teal-light);
  text-decoration: none;
  font-weight: 500;
}

.login-links a:hover {
  text-decoration: underline;
}
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="#" class="logo">
    <div class="logo-icon">⚕</div>
    Swasth<span>Bharat</span>
  </a>
</nav>
    
<div class="login-container">
  <div class="login-card">
    
    <div class="login-title">Patient Login</div>
    <div class="login-sub">Access your health dashboard</div>

    <form method="POST" action="/patientlogin">
      
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="login-btn">Login</button>

    </form>

    <div class="login-links">
      <p>Don’t have an account? <a href="/patientregister">Create Account</a></p>
      <p><a href="/doctorregister">Register as Doctor</a></p>
    </div>

  </div>
</div>
    
</body>
